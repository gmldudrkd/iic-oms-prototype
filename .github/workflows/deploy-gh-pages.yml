name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Create .env.prototype from secrets
        run: |
          cat <<EOF > .env.prototype
          NEXT_PUBLIC_PROTOTYPE_MODE=true
          NEXT_PUBLIC_RUN_MODE=development
          NEXT_PUBLIC_ENVIRONMENT=PROTOTYPE
          NEXT_PUBLIC_MUI_LICENSE_KEY=${{ secrets.MUI_LICENSE_KEY }}
          NEXT_PUBLIC_HOST_URL=https://gmldudrkd.github.io/iic-oms-prototype
          NEXT_PUBLIC_API_BASE_URL=https://gmldudrkd.github.io/iic-oms-prototype
          NEXT_PUBLIC_API_BASE_URL_VERSION=/v1
          NEXT_PUBLIC_AUTH_API_BASE_URL=https://gmldudrkd.github.io/iic-oms-prototype
          NEXT_PUBLIC_AUTH_API_VERSION=/v1
          NEXT_PUBLIC_STORE_API_BASE_URL=https://gmldudrkd.github.io/iic-oms-prototype
          NEXT_PUBLIC_PIM_API_BASE_URL=https://gmldudrkd.github.io/iic-oms-prototype
          NEXT_PUBLIC_ADAPTER_API_BASE_URL=https://gmldudrkd.github.io/iic-oms-prototype
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL=https://gmldudrkd.github.io/iic-oms-prototype
          EOF

      - run: GITHUB_PAGES=true npx env-cmd -f .env.prototype next build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          enable_jekyll: false
